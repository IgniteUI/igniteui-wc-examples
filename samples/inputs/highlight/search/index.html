<!DOCTYPE html>
<html>

<head>
  <title>Highlight Search</title>
  <meta charset="UTF-8" />

  <link rel="shortcut icon" href="https://dl.infragistics.com/x/img/browsers/wc.png" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Kanit&display=swap" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Titillium Web" />
  <link rel="stylesheet" href="https://dl.infragistics.com/x/css/samples/shared.v5.css" type="text/css" />
</head>

<body>
  <div id="root">
    <div class="container sample center">
      <div class="search-bar">
        <igc-input label="Search">
          <igc-icon-button id="prev-btn" variant="flat" name="navigate_before" collection="internal" slot="suffix"></igc-icon-button>
          <igc-icon-button id="next-btn" variant="flat" name="navigate_next" collection="internal" slot="suffix"></igc-icon-button>
        </igc-input>
      </div>
      <igc-divider></igc-divider>
      <igc-highlight>
        <p>
          Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quae doloribus
          odit id excepturi ipsum provident eaque dignissimos beatae! Rerum vero
          distinctio libero, quasi magni quod natus nesciunt doloremque temporibus
          voluptate?
        </p>
      </igc-highlight>
    </div>
  </div>
  <!-- This script is needed only for parcel and it will be excluded for webpack -->
  <% if (false) { %>
    <script src="src/index.ts"></script>
    <% } %>
</body>

</html>
