<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Iframe scroll test</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    .spacer { height: 2000px; background: linear-gradient(white, #eee); display: flex; align-items: flex-start; padding: 20px; }
    .label { font-size: 1.5rem; color: #999; }
    .target { padding: 20px; background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="spacer">
    <span class="label">Scroll down to see the iframe (or watch if the page jumps there automatically)</span>
  </div>
  <div class="target">
    <h2>Sample iframe page should NOT auto-scroll here on load</h2>
    <iframe
      src="/maps/geo-map/display-osm-imagery"
      width="100%"
      height="600"
      frameborder="0"
    ></iframe>
  </div>
</body>
</html>
